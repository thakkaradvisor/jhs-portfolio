<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHS Analytics Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="page-header">
            <div class="eyebrow">⚡ JHS Analytics</div>
            <h1 class="title">Explore Dashboards</h1>
            <div style="text-align:center; margin-bottom: 20px;">
                <span class="count-badge">Showing <span id="cs">0</span> of <span id="ct">0</span> projects</span>
            </div>
        </div>

        <div class="filters-bar" id="filters-container">
            <span class="fl">Filter:</span>
            <button class="fb active" onclick="filter('All', this)">All</button>
        </div>

        <div class="portfolio-grid" id="portfolio-grid">
            </div>
    </div>

<script>
    // 1. DATA LOADING CONFIGURATION
    // Use the specific CSV link for your sheet
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNa65Z_LhorOp6gdsFWQ4oIJb6MoyFyFAoEv92doWMHpRkrCZIbB4tGCHamC2LMMMV0gfze9EYOR2G/pub?gid=0&single=true&output=csv";
    let DATA = [];
    let AF = 'All';

    async function loadDataFromSheet() {
        try {
            const response = await fetch(sheetUrl);
            const csvData = await response.text();
            // Split by rows and skip the header
            const rows = csvData.split('\n').slice(1); 

            DATA = rows.map(row => {
                // This regex handles commas correctly if they are inside double quotes in your descriptions
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                // Matches your 5-column layout: Title(0), Industry(1), Description(2), DashURL(3), ImageURL(4)
                if (cols.length < 5) return null;

                return {
                    title: cols[0]?.replace(/"/g, '').trim(),
                    industry: cols[1]?.replace(/"/g, '').trim(),
                    description: cols[2]?.replace(/"/g, '').trim(),
                    dashboardUrl: cols[3]?.replace(/"/g, '').trim(), // Index 3: Dashboard URL
                    imageUrl: cols[4]?.replace(/"/g, '').trim()    // Index 4: Image URL
                };
            }).filter(p => p !== null && p.title !== "");

            refresh();
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('portfolio-grid').innerHTML = 
                '<div style="grid-column:1/-1;text-align:center;padding:100px;">Error connecting to Google Sheets.</div>';
        }
    }

    // 2. FILTERING LOGIC
    function buildFilters() {
        const bar = document.getElementById('filters-container');
        if (!bar) return;

        // Reset the bar with the 'All' button
        bar.innerHTML = '<span class="fl">Filter:</span><button class="fb active" onclick="filter(\'All\', this)">All</button>';
        
        // Dynamically create buttons for every unique industry in your sheet
        const industries = [...new Set(DATA.map(p => p.industry))];
        industries.forEach(ind => {
            if(ind) {
                const b = document.createElement('button');
                b.className = 'fb'; 
                b.textContent = ind;
                b.onclick = (e) => filter(ind, e.target); 
                bar.appendChild(b);
            }
        });
    }

    function filter(v, btn) {
        AF = v;
        document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(v === 'All' ? DATA : DATA.filter(p => p.industry === v));
    }

    function refresh() { 
        buildFilters(); 
        render(AF === 'All' ? DATA : DATA.filter(p => p.industry === AF)); 
    }

    // 3. RENDERING LOGIC
    function render(list) {
        // Update project counters
        const ctElem = document.getElementById('ct');
        const csElem = document.getElementById('cs');
        if (ctElem) ctElem.textContent = DATA.length;
        if (csElem) csElem.textContent = list.length;
        
        const g = document.getElementById('portfolio-grid');
        
        if (!list.length) {
            g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;">No projects found.</div>';
            return;
        }

        g.innerHTML = list.map((p, i) => `
            <div class="portfolio-card" onclick="window.open('${p.dashboardUrl}', '_blank')">
                <div class="card-header">
                    <span class="industry-badge">${p.industry}</span>
                    <div class="image-container" style="height:100%;">
                        <img src="${p.imageUrl}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/400x200?text=Preview+Loading...'">
                    </div>
                </div>

                <div class="portfolio-info">
                    <h3>${p.title}</h3>
                    <p class="description">${p.description}</p>
                    <div class="open-btn" onclick="event.stopPropagation(); window.open('${p.dashboardUrl}', '_blank')">
                        Open Dashboard
                    </div>
                </div>
            </div>`).join('');
    }

    // Initialize the load
    loadDataFromSheet();
</script>
</body>
</html>

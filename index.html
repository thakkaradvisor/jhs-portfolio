<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHS Analytics Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="page-header">
            <div class="eyebrow">⚡JHS Analytics Analytics</div>
            <h1 class="title">Featured Projects</h1>
            <div style="text-align:center; margin-bottom: 20px;">
                <span class="count-badge">Showing <span id="cs">0</span> of <span id="ct">0</span> projects</span>
            </div>
        </div>

        <div class="filters-bar" id="filters-container">
            <span class="fl">Filter:</span>
            <button class="fb active" onclick="filter('All', this)">All</button>
        </div>

        <div class="portfolio-grid" id="portfolio-grid">
            </div>
    </div>

    <script>
        // 1. Industry Configuration
        const IC = {
            'Finance':       {bg:'#1A5C3A', lt:'#E8F5EE', tx:'#1A5C3A', ic:'💰'},
            'HR':            {bg:'#7C3AED', lt:'#F3EEFF', tx:'#7C3AED', ic:'👥'},
            'Supply Chain':  {bg:'#B45309', lt:'#FEF3E2', tx:'#B45309', ic:'🚛'},
            'Share Market':  {bg:'#1D4ED8', lt:'#EFF4FF', tx:'#1D4ED8', ic:'📈'},
            'Sales':         {bg:'#BE185D', lt:'#FDF0F6', tx:'#BE185D', ic:'🛒'},
            'Operations':    {bg:'#0F766E', lt:'#EDFAF8', tx:'#0F766E', ic:'⚙️'},
            'Procurement':   {bg:'#92400E', lt:'#FEF3E2', tx:'#92400E', ic:'📦'},
            'Reconciliation':{bg:'#374151', lt:'#F3F4F6', tx:'#374151', ic:'🔁'},
        };

        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNa65Z_LhorOp6gdsFWQ4oIJb6MoyFyFAoEv92doWMHpRkrCZIbB4tGCHamC2LMMMV0gfze9EYOR2G/pub?gid=0&single=true&output=csv";
        let DATA = [];
        let AF = 'All';

        // 2. Data Loading
        async function loadDataFromSheet() {
            try {
                const response = await fetch(sheetUrl);
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1); 

                DATA = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 5) return null;

                    return {
                        title: cols[0].replace(/"/g, '').trim(),
                        industry: cols[1].replace(/"/g, '').trim(),
                        description: cols[2].replace(/"/g, '').trim(),
                        dashboardUrl: cols[3].replace(/"/g, '').trim(),
                        imageUrl: cols[4].replace(/"/g, '').trim()
                    };
                }).filter(p => p !== null);

                refresh();
            } catch (error) {
                console.error("Error loading sheet:", error);
            }
        }

        // 3. Helpers
        function gc(ind) {
            for (const [k, v] of Object.entries(IC)) 
                if (ind && ind.toLowerCase().includes(k.toLowerCase())) return v;
            return {bg:'#1E6FFF', lt:'#EEF3FF', tx:'#1E6FFF', ic:'📊'};
        }

        function buildFilters() {
            const bar = document.getElementById('filters-container');
            bar.querySelectorAll('.fb:not(:nth-child(2))').forEach(b => b.remove());
            
            [...new Set(DATA.map(p => p.industry))].forEach(ind => {
                const b = document.createElement('button');
                b.className = 'fb'; 
                b.textContent = ind;
                b.onclick = (e) => filter(ind, e.target); 
                bar.appendChild(b);
            });
        }

        function filter(v, btn) {
            AF = v;
            document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(v === 'All' ? DATA : DATA.filter(p => p.industry === v));
        }

function render(list) {
    document.getElementById('ct').textContent = DATA.length;
    document.getElementById('cs').textContent = list.length;
    const g = document.getElementById('portfolio-grid');
    
    g.innerHTML = list.map((p, i) => {
        const hasImage = p.imageUrl && p.imageUrl.trim() !== '';
        
        return `
            <div class="portfolio-card" 
                 style="animation: fadeInUp 0.5s ease forwards; animation-delay: ${i * 0.05}s; opacity: 0;" 
                 onclick="window.open('${p.dashboardUrl}', '_blank')">
                
                <div class="card-header">
                    <span class="industry-badge">${p.industry}</span>
                    <div class="image-container" style="height:100%;">
                        ${hasImage 
                            ? `<img src="${p.imageUrl}" alt="${p.title}" onerror="this.style.display='none';">`
                            : `<div style="width:100%; height:100%; background:#f3f4f6;"></div>`}
                    </div>
                </div>

                <div class="portfolio-info">
                    <h3>${p.title}</h3>
                    <p class="description">${p.description}</p>
                    <div class="open-btn">Open</div>
                </div>
            </div>`;
    }).join('');
}
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHS Analytics Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="page-header">
            <div class="eyebrow">⚡ JHS Analytics</div>
            <h1 class="title">Explore Dashboards</h1>
            <div style="text-align:center; margin-bottom: 20px;">
                <span class="count-badge">Showing <span id="cs">0</span> of <span id="ct">0</span> projects</span>
            </div>
        </div>

        <div class="filters-bar" id="filters-container">
            <span class="fl">Filter:</span>
            <button class="fb active" onclick="filter('All', this)">All</button>
        </div>

        <div class="portfolio-grid" id="portfolio-grid">
            </div>
    </div>

    <script>
    // 1. Configuration
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqp9gms0RGShThKaCK-raQCbciyNSTi94uSthfKyZXeir3TZE9q4bStringXjp9i0S0vmZSkaiTdRkSEx9Xs/pub?gid=0&single=true&output=csv";
    let DATA = [];
    let AF = 'All';

    // 2. Data Loading
    async function loadDataFromSheet() {
        try {
            const response = await fetch(sheetUrl);
            const csvData = await response.text();
            const rows = csvData.split('\n').slice(1); 

            DATA = rows.map(row => {
                // Regex to handle commas inside quoted descriptions
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                // Maps to your 5 columns: Title(0), Industry(1), Description(2), DashURL(3), ImageURL(4)
                if (cols.length < 5) return null;

                return {
                    title: cols[0]?.replace(/"/g, '').trim(),
                    industry: cols[1]?.replace(/"/g, '').trim(),
                    description: cols[2]?.replace(/"/g, '').trim(),
                    dashboardUrl: cols[3]?.replace(/"/g, '').trim(), // Column D
                    imageUrl: cols[4]?.replace(/"/g, '').trim()    // Column E
                };
            }).filter(p => p !== null && p.title !== "");

            refresh();
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('portfolio-grid').innerHTML = 
                '<div style="grid-column:1/-1;text-align:center;padding:100px;">Error loading data. Please check your connection.</div>';
        }
    }

    // 3. Filtering & Helpers
    function buildFilters() {
        const bar = document.getElementById('filters-container');
        if (!bar) return;

        // Reset bar with 'All' button
        bar.innerHTML = '<span class="fl">Filter:</span><button class="fb active" onclick="filter(\'All\', this)">All</button>';
        
        // Get unique industries and create buttons
        [...new Set(DATA.map(p => p.industry))].forEach(ind => {
            if(ind) {
                const b = document.createElement('button');
                b.className = 'fb'; 
                b.textContent = ind;
                b.onclick = (e) => filter(ind, e.target); 
                bar.appendChild(b);
            }
        });
    }

    function filter(v, btn) {
        AF = v;
        document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(v === 'All' ? DATA : DATA.filter(p => p.industry === v));
    }

    function refresh() { 
        buildFilters(); 
        render(AF === 'All' ? DATA : DATA.filter(p => p.industry === AF)); 
    }

    // 4. Rendering Logic
    function render(list) {
        document.getElementById('ct').textContent = DATA.length;
        document.getElementById('cs').textContent = list.length;
        const g = document.getElementById('portfolio-grid');
        
        if (!list.length) {
            g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;">No projects found.</div>';
            return;
        }

        g.innerHTML = list.map((p, i) => {
            const hasImage = p.imageUrl && p.imageUrl.trim() !== '';
            
            return `
                <div class="portfolio-card" onclick="window.open('${p.dashboardUrl}', '_blank')">
                    <div class="card-header">
                        <span class="industry-badge">${p.industry}</span>
                        <div class="image-container" style="height:100%;">
                            ${hasImage 
                                ? `<img src="${p.imageUrl}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/400x200?text=Preview+Coming+Soon'">`
                                : `<div style="width:100%; height:100%; background:#f3f4f6;"></div>`}
                        </div>
                    </div>

                    <div class="portfolio-info">
                        <h3>${p.title}</h3>
                        <p class="description">${p.description}</p>
                        <div class="open-btn" onclick="event.stopPropagation(); window.open('${p.dashboardUrl}', '_blank')">
                            Open Dashboard
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    // Initialize
    loadDataFromSheet();
</script>
</body>    
</html>

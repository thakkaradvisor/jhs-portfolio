<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JHS Analytics Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F7F6F3; --white: #FFFFFF; --text: #1A1A1A;
    --muted: #6B6B6B; --border: #E5E3DE; --accent: #1E6FFF;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .page-header { padding: 48px 48px 0; max-width: 1200px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .header-left .eyebrow { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .header-left h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--text); line-height: 1.2; }
  .project-count { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 0.82rem; color: var(--muted); font-weight: 500; }
  .project-count span { color: var(--accent); font-weight: 700; }

  .filters-bar { max-width: 1200px; margin: 28px auto 0; padding: 0 48px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px; }
  .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); color: var(--muted); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .filter-btn:hover { border-color: #bbb; color: var(--text); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .grid-wrapper { max-width: 1200px; margin: 32px auto 64px; padding: 0 48px; }
  .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

  .card { background: var(--white); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.22s, box-shadow 0.22s; cursor: pointer; animation: fadeIn 0.4s ease both; }
  .card:hover { transform: translateY(-5px); box-shadow: 0 16px 48px rgba(0,0,0,0.09); }
  @keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  .card-img { position: relative; height: 200px; overflow: hidden; background: #e8e6e1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.35s ease; }
  .card:hover .card-img img { transform: scale(1.04); }
  .card-img .img-placeholder { font-size: 3rem; opacity: 0.35; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .card-img img.errored { display: none; }
  .ind-pill { position: absolute; top: 14px; left: 14px; z-index: 2; padding: 4px 12px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; color: #fff; }

  .card-body { padding: 20px 20px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .card-title { font-size: 1rem; font-weight: 600; line-height: 1.35; color: var(--text); }
  .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.65; flex: 1; }
  .card-tools { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tool-tag { padding: 3px 10px; border-radius: 10px; font-size: 0.68rem; font-weight: 600; background: var(--bg); color: var(--muted); border: 1px solid var(--border); }

  .card-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .view-btn { font-size: 0.78rem; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; }
  .view-btn .arrow { transition: transform 0.2s; }
  .card:hover .view-btn .arrow { transform: translateX(4px); }

  .state-box { grid-column: span 3; text-align: center; padding: 80px 24px; color: var(--muted); }
  .state-box .icon { font-size: 3rem; margin-bottom: 16px; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(15,15,15,0.55); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 22px; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,0.22); animation: modalIn 0.25s ease; }
  @keyframes modalIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .modal-img { width: 100%; height: 240px; object-fit: cover; display: block; }
  .modal-img-placeholder { height: 240px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
  .modal-content { padding: 28px; }
  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; line-height: 1.25; flex: 1; }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-size: 1rem; color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: inherit; }
  .modal-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.75; margin-bottom: 22px; }
  .modal-section { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }
  .features-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .features-list li { display: flex; gap: 10px; font-size: 0.86rem; align-items: flex-start; }
  .modal-tools { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-tool { padding: 5px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }

  /* EDIT PANEL */
  .edit-fab { position: fixed; bottom: 28px; right: 28px; z-index: 500; background: var(--text); color: #fff; border: none; border-radius: 50px; padding: 12px 22px; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
  .edit-fab:hover { opacity: 0.85; }
  .edit-panel-overlay { display: none; position: fixed; inset: 0; z-index: 800; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
  .edit-panel-overlay.open { display: block; }
  .edit-panel { position: fixed; right: 0; top: 0; bottom: 0; z-index: 900; width: 520px; max-width: 95vw; background: var(--white); box-shadow: -8px 0 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; }
  .edit-panel.open { transform: translateX(0); }
  .edit-panel-header { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .edit-panel-header h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
  .ep-close { background: var(--bg); border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
  .edit-panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .ep-note { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px 14px; font-size: 0.8rem; color: #92400e; line-height: 1.5; }
  .ep-project-list { display: flex; flex-direction: column; gap: 8px; }
  .ep-project-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; transition: border-color 0.15s; }
  .ep-project-item:hover { border-color: var(--accent); }
  .ep-project-item .ep-name { font-size: 0.85rem; font-weight: 600; }
  .ep-project-item .ep-ind { font-size: 0.72rem; color: var(--muted); }
  .ep-project-item .ep-edit-btn { font-size: 0.75rem; color: var(--accent); font-weight: 600; white-space: nowrap; }
  .ep-form { display: flex; flex-direction: column; gap: 14px; }
  .ep-field label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 5px; }
  .ep-field input, .ep-field textarea, .ep-field select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.85rem; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .ep-field input:focus, .ep-field textarea:focus { border-color: var(--accent); background: #fff; }
  .ep-field textarea { resize: vertical; min-height: 70px; }
  .ep-field small { display: block; font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .ep-actions { display: flex; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border); }
  .ep-save { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 11px; font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .ep-save:hover { background: #1558d6; }
  .ep-cancel { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 11px 18px; font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .ep-add { background: var(--bg); color: var(--text); border: 1px dashed var(--border); border-radius: 10px; padding: 11px; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-align: center; width: 100%; transition: border-color 0.15s; }
  .ep-add:hover { border-color: var(--accent); color: var(--accent); }
  .ep-delete { background: #fff0f0; color: #dc2626; border: 1px solid #fecaca; border-radius: 10px; padding: 11px 16px; font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; }

  @media (max-width: 960px) { .projects-grid { grid-template-columns: 1fr 1fr; } .state-box { grid-column: span 2; } }
  @media (max-width: 600px) { .page-header, .filters-bar, .grid-wrapper { padding-left: 20px; padding-right: 20px; } .projects-grid { grid-template-columns: 1fr; } .state-box { grid-column: span 1; } .page-header h1 { font-size: 1.7rem; } }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-left">
    <div class="eyebrow">⚡ Power BI Analytics</div>
    <h1>Featured Projects</h1>
  </div>
  <div class="project-count">Showing <span id="countShowing">0</span> of <span id="countTotal">0</span> projects</div>
</div>

<div class="filters-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="applyFilter('All', this)">All</button>
</div>

<div class="grid-wrapper">
  <div class="projects-grid" id="grid"></div>
</div>

<!-- Project detail modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div id="modal-img-wrap"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-section">Key Features</div>
      <ul class="features-list" id="modal-features"></ul>
      <div class="modal-section">Tools & Technologies</div>
      <div class="modal-tools" id="modal-tools"></div>
    </div>
  </div>
</div>

<!-- Edit FAB -->
<button class="edit-fab" onclick="openEditPanel()">✏️ Edit Projects</button>

<!-- Edit panel backdrop -->
<div class="edit-panel-overlay" id="epOverlay" onclick="closeEditPanel()"></div>

<!-- Edit panel -->
<div class="edit-panel" id="editPanel">
  <div class="edit-panel-header">
    <h3 id="epTitle">Edit Projects</h3>
    <button class="ep-close" onclick="closeEditPanel()">✕</button>
  </div>
  <div class="edit-panel-body" id="epBody"></div>
  <div class="ep-actions" id="epActions"></div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════════════════════╗
// ║  YOUR PROJECT DATA — edit directly here OR use the ✏️ Edit button      ║
// ║  imageUrl: paste a direct image link (imgur, google drive public, etc.) ║
// ║  features: separate items with |  •  tools: separate with ,            ║
// ╚══════════════════════════════════════════════════════════════════════════╝
let allProjects = [
  {
    title: "P&L & Financial Close Dashboard",
    industry: "Finance",
    description: "Real-time profit & loss visibility with budget vs. actual tracking and multi-entity consolidation across business units.",
    features: ["Replaced 40+ manual Excel reports","Live financial close tracking","Multi-entity consolidation","Drill-down by department & cost center","Budget vs. actual with variance analysis"],
    tools: ["Power BI","DAX","SQL Server"],
    imageUrl: ""
  },
  {
    title: "Workforce & Attrition Analytics",
    industry: "HR",
    description: "Unified HR intelligence covering headcount trends, attrition drivers, hiring pipeline, and payroll cost in one view.",
    features: ["Attrition trend analysis by department","Headcount vs budget tracking","Hiring funnel & time-to-hire KPIs","Payroll cost breakdown","Employee tenure & diversity metrics"],
    tools: ["Power BI","HR System","Excel","SharePoint"],
    imageUrl: ""
  },
  {
    title: "Supply Chain & Logistics Tracker",
    industry: "Supply Chain",
    description: "End-to-end supply chain visibility from purchase order to delivery with inventory health and demand forecasting from ERP.",
    features: ["Inventory aging & stock alerts","Delivery performance (DIFOT)","Demand vs supply planning","Vendor lead time analysis","Route & freight cost optimization"],
    tools: ["Power BI","ERP Integration","Python","SQL"],
    imageUrl: ""
  },
  {
    title: "Portfolio Monitoring Dashboard",
    industry: "Share Market",
    description: "Live-connected portfolio monitoring dashboard covering stock performance, sector allocation, and risk exposure with real-time market data.",
    features: ["Real-time stock price feeds via API","Portfolio vs benchmark tracking","Sector & geography allocation","Risk and volatility metrics","Gain/Loss reporting"],
    tools: ["Power BI","REST API","Azure","SQL"],
    imageUrl: ""
  },
  {
    title: "Sales Performance & Pipeline",
    industry: "Sales",
    description: "360 degree sales analytics platform tracking revenue, rep performance, pipeline health, and target attainment across regions.",
    features: ["Revenue vs target by region & rep","Pipeline stage & conversion rates","Product & customer segment analysis","Rolling forecasts & trend analysis","Rep leaderboard & incentive tracking"],
    tools: ["Power BI","CRM","SQL","Excel"],
    imageUrl: ""
  },
  {
    title: "Operations Efficiency & OEE",
    industry: "Operations",
    description: "Plant and operations efficiency dashboard tracking OEE, downtime, throughput, and shift-level performance to support continuous improvement.",
    features: ["OEE and machine utilization tracking","Downtime root-cause analysis","Shift & production line performance","Production vs capacity planning","Quality defect rate monitoring"],
    tools: ["Power BI","SCADA","SQL","ERP"],
    imageUrl: ""
  },
  {
    title: "Procurement Spend & Planning",
    industry: "Procurement",
    description: "Spend analytics and planning dashboard covering vendor performance, PO cycle times, contract compliance, and demand-supply planning from ERP.",
    features: ["Spend analysis by category & vendor","PO approval & cycle time KPIs","Vendor scorecard & compliance","Demand & capacity planning","Contract expiry alerts"],
    tools: ["Power BI","ERP (SAP)","Excel","SQL"],
    imageUrl: ""
  },
  {
    title: "Reconciliation & Audit Tracker",
    industry: "Reconciliation",
    description: "Automated reconciliation tracker that flags discrepancies, tracks resolution status, and produces audit-ready reports.",
    features: ["Automated discrepancy detection","Resolution status & aging tracker","Bank-to-book reconciliation","Audit trail and exception reports","Inter-company matching workflows"],
    tools: ["Power BI","SQL","Excel","SharePoint"],
    imageUrl: ""
  }
];

// ── INDUSTRY COLORS ──────────────────────────────────────────────────────────
const IND_COLORS = {
  'Finance':        { bg: '#1A5C3A', light: '#E8F5EE', text: '#1A5C3A', icon: '💰' },
  'HR':             { bg: '#7C3AED', light: '#F3EEFF', text: '#7C3AED', icon: '👥' },
  'Supply Chain':   { bg: '#B45309', light: '#FEF3E2', text: '#B45309', icon: '🚛' },
  'Share Market':   { bg: '#1D4ED8', light: '#EFF4FF', text: '#1D4ED8', icon: '📈' },
  'Sales':          { bg: '#BE185D', light: '#FDF0F6', text: '#BE185D', icon: '🛒' },
  'Operations':     { bg: '#0F766E', light: '#EDFAF8', text: '#0F766E', icon: '⚙️' },
  'Procurement':    { bg: '#92400E', light: '#FEF3E2', text: '#92400E', icon: '📦' },
  'Reconciliation': { bg: '#374151', light: '#F3F4F6', text: '#374151', icon: '🔁' },
};
function getColor(industry) {
  for (const [key, val] of Object.entries(IND_COLORS)) {
    if (industry && industry.toLowerCase().includes(key.toLowerCase())) return val;
  }
  return { bg: '#1E6FFF', light: '#EEF3FF', text: '#1E6FFF', icon: '📊' };
}

let activeFilter = 'All';
let editingIndex = null;

// ── FILTERS ──────────────────────────────────────────────────────────────────
function buildFilters() {
  const bar = document.querySelector('.filters-bar');
  bar.querySelectorAll('.filter-btn:not(:first-child)').forEach(b => b.remove());
  const industries = [...new Set(allProjects.map(p => p.industry).filter(Boolean))];
  industries.forEach(ind => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = ind;
    btn.onclick = () => applyFilter(ind, btn);
    bar.appendChild(btn);
  });
}
function applyFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(val === 'All' ? allProjects : allProjects.filter(p => p.industry === val));
}

// ── RENDER GRID ───────────────────────────────────────────────────────────────
function renderGrid(projects) {
  document.getElementById('countTotal').textContent   = allProjects.length;
  document.getElementById('countShowing').textContent = projects.length;
  const grid = document.getElementById('grid');
  if (!projects.length) {
    grid.innerHTML = `<div class="state-box"><div class="icon">🔍</div><p>No projects found.</p></div>`;
    return;
  }
  grid.innerHTML = projects.map((p, i) => {
    const realIdx = allProjects.indexOf(p);
    const c = getColor(p.industry);
    const hasImg = p.imageUrl && p.imageUrl.trim() !== '';
    const imgHtml = hasImg
      ? `<img src="${p.imageUrl}" alt="${p.title}" onerror="this.classList.add('errored');this.nextElementSibling.style.display='flex'">
         <div class="img-placeholder" style="display:none">${c.icon}</div>`
      : `<div class="img-placeholder">${c.icon}</div>`;
    const toolTags = p.tools.slice(0,3).map(t => `<span class="tool-tag">${t}</span>`).join('');
    const extra = p.tools.length > 3 ? `<span class="tool-tag">+${p.tools.length-3}</span>` : '';
    return `
    <div class="card" style="animation-delay:${i*0.06}s" onclick="openModal(${realIdx})">
      <div class="card-img">
        ${imgHtml}
        <span class="ind-pill" style="background:${c.bg}">${p.industry}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.description}</div>
        <div class="card-tools">${toolTags}${extra}</div>
      </div>
      <div class="card-footer">
        <button class="view-btn" onclick="event.stopPropagation();openModal(${realIdx})">View Details <span class="arrow">→</span></button>
      </div>
    </div>`;
  }).join('');
}

function refresh() {
  buildFilters();
  const filtered = activeFilter === 'All' ? allProjects : allProjects.filter(p => p.industry === activeFilter);
  renderGrid(filtered);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(idx) {
  const p = allProjects[idx];
  const c = getColor(p.industry);
  const hasImg = p.imageUrl && p.imageUrl.trim() !== '';
  document.getElementById('modal-img-wrap').innerHTML = hasImg
    ? `<img class="modal-img" src="${p.imageUrl}" alt="${p.title}" onerror="this.style.display='none'">`
    : `<div class="modal-img-placeholder" style="background:${c.light}">${c.icon}</div>`;
  document.getElementById('modal-title').textContent = p.title;
  document.getElementById('modal-desc').textContent  = p.description;
  document.getElementById('modal-features').innerHTML = p.features.map(f =>
    `<li><span style="color:${c.text};font-weight:700;margin-right:6px">✓</span>${f}</li>`).join('');
  document.getElementById('modal-tools').innerHTML = p.tools.map(t =>
    `<span class="modal-tool" style="background:${c.light};color:${c.text}">${t}</span>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.type === 'click' && e.target.id !== 'overlay') return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeEditPanel(); } });

// ── EDIT PANEL ────────────────────────────────────────────────────────────────
function openEditPanel() {
  showProjectList();
  document.getElementById('editPanel').classList.add('open');
  document.getElementById('epOverlay').classList.add('open');
}
function closeEditPanel() {
  document.getElementById('editPanel').classList.remove('open');
  document.getElementById('epOverlay').classList.remove('open');
  editingIndex = null;
}

function showProjectList() {
  document.getElementById('epTitle').textContent = 'Edit Projects';
  document.getElementById('epBody').innerHTML = `
    <div class="ep-note">💡 Click any project to edit it, or add a new one below.</div>
    <div class="ep-project-list">
      ${allProjects.map((p,i) => {
        const c = getColor(p.industry);
        return `<div class="ep-project-item" onclick="showEditForm(${i})">
          <div><div class="ep-name">${p.title}</div><div class="ep-ind" style="color:${c.text}">${p.industry}</div></div>
          <span class="ep-edit-btn">Edit →</span>
        </div>`;
      }).join('')}
    </div>
    <button class="ep-add" onclick="showEditForm(-1)">+ Add New Project</button>`;
  document.getElementById('epActions').innerHTML = '';
}

function showEditForm(idx) {
  editingIndex = idx;
  const p = idx === -1 ? { title:'', industry:'', description:'', features:[], tools:[], imageUrl:'' } : allProjects[idx];
  document.getElementById('epTitle').textContent = idx === -1 ? 'Add New Project' : 'Edit Project';
  document.getElementById('epBody').innerHTML = `
    <div class="ep-form">
      <div class="ep-field"><label>Title</label><input id="ef-title" value="${esc(p.title)}" placeholder="Dashboard name"></div>
      <div class="ep-field"><label>Industry</label>
        <select id="ef-industry">
          ${['Finance','HR','Supply Chain','Share Market','Sales','Operations','Procurement','Reconciliation']
            .map(ind => `<option ${p.industry===ind?'selected':''}>${ind}</option>`).join('')}
        </select>
      </div>
      <div class="ep-field"><label>Description</label><textarea id="ef-desc" rows="3">${esc(p.description)}</textarea></div>
      <div class="ep-field"><label>Key Features</label><textarea id="ef-features" rows="4">${p.features.join('\n')}</textarea><small>One feature per line</small></div>
      <div class="ep-field"><label>Tools</label><input id="ef-tools" value="${p.tools.join(', ')}" placeholder="Power BI, SQL, DAX"><small>Separate with commas</small></div>
      <div class="ep-field"><label>Image URL</label><input id="ef-img" value="${esc(p.imageUrl)}" placeholder="https://i.imgur.com/yourimage.png"><small>Paste a direct image link. Leave blank to show icon.</small></div>
    </div>`;
  document.getElementById('epActions').innerHTML = `
    <button class="ep-cancel" onclick="showProjectList()">← Back</button>
    ${idx !== -1 ? `<button class="ep-delete" onclick="deleteProject(${idx})">Delete</button>` : ''}
    <button class="ep-save" onclick="saveProject()">Save Project</button>`;
}

function esc(str) { return (str||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function saveProject() {
  const p = {
    title:       document.getElementById('ef-title').value.trim(),
    industry:    document.getElementById('ef-industry').value,
    description: document.getElementById('ef-desc').value.trim(),
    features:    document.getElementById('ef-features').value.split('\n').map(f=>f.trim()).filter(Boolean),
    tools:       document.getElementById('ef-tools').value.split(',').map(t=>t.trim()).filter(Boolean),
    imageUrl:    document.getElementById('ef-img').value.trim(),
  };
  if (!p.title) { alert('Please enter a title.'); return; }
  if (editingIndex === -1) allProjects.push(p);
  else allProjects[editingIndex] = p;
  refresh();
  showProjectList();
}

function deleteProject(idx) {
  if (!confirm('Delete this project?')) return;
  allProjects.splice(idx, 1);
  refresh();
  showProjectList();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
refresh();
</script>
</body>
</html>
